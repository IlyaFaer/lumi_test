services:
    api:
        build:
            context: .
            dockerfile: Dockerfile.api
        ports:
            - "8000:8000"
        container_name: api
        volumes:
            - ./app:/app
        command: uvicorn main:app --host 0.0.0.0 --port 8000

    db:
        image: postgres:16.10
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: luminary
        ports:
            - "5432:5432"
        container_name: db
        volumes:
            - db_data:/var/lib/postgresql/data

volumes:
    db_data:
